# Beszel Hub - GitOps stack for Portainer
#
# Hub-only on purpose: deploying just this file never gets blocked by the
# agent's required TOKEN/KEY vars, which don't exist until the hub has
# booted once anyway. See docker-compose.agent.yml for the agent.
#
# Deploy via Portainer: Stacks -> Add stack -> Build method: Repository,
# point it at this fork/branch with compose path "docker-compose.yml".
# Portainer builds the image directly from this repo's Dockerfile on every
# redeploy, so no separate registry push is required.
#
# Set APP_URL / HUB_PORT in the stack's "Environment variables" field in
# the Portainer UI if you don't want the defaults below.
#
# Docs: https://beszel.dev/guide/getting-started
# Env vars: https://beszel.dev/guide/environment-variables

services:
  beszel:
    image: ghcr.io/hari-craz/beszel/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-http://localhost:8090}
      POLL_INTERVAL: ${POLL_INTERVAL:-15}
    ports:
      - "${HUB_PORT:-8090}:8090"
    volumes:
      - beszel_data:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 120s
      start_period: 10s
      timeout: 5s

volumes:
  beszel_data:
